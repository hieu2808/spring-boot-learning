spring.application.name=employee-management

# ===== Active Profile =====
# Đổi thành "prod" khi deploy lên production
spring.profiles.active=dev

# ===== Common Settings =====
server.address=0.0.0.0

# ===== Error Handling =====
# Không show stack trace trong response
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-exception=false

# ===== Logging =====
# Format log ra console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===== Spring Boot Actuator =====
# Mở tất cả endpoints qua HTTP (health, metrics, info, caches, ...)
management.endpoints.web.exposure.include=health,metrics,info,caches
# Hiển thị chi tiết health (UP/DOWN từng component)
management.endpoint.health.show-details=always
# Base path mặc định: /actuator
management.endpoints.web.base-path=/actuator

# ===== Cache (Caffeine) =====
spring.cache.type=caffeine

# ===== JWT =====
# Secret key đọc từ environment variable JWT_SECRET
# Fallback cho dev local (không dùng ở production)
jwt.secret=${JWT_SECRET:employee-management-super-secret-key-2026}
# Token hết hạn sau 24 giờ (ms)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
