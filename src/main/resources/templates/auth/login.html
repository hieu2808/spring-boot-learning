<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 420px;">
      <h3 class="mb-4 text-center">Đăng nhập</h3>

      <!-- Spring Security đặt ?error khi sai username/password -->
      <div th:if="${param.error}" class="alert alert-danger">
        Username hoặc mật khẩu không đúng.
      </div>
      <!-- Spring Security đặt ?logout khi đăng xuất thành công -->
      <div th:if="${param.logout}" class="alert alert-success">
        Đã đăng xuất thành công.
      </div>
      <!-- Flash message sau đăng ký -->
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

      <!-- Spring Security xử lý POST /login — name phải là "username" và "password" -->
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control"
                 placeholder="Nhập username" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Nhập mật khẩu" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </div>
      </form>

      <hr>
      <p class="text-center mb-0">
        Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
      </p>
    </div>
  </div>
</body>
</html>
