<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 420px;">
      <h3 class="mb-4 text-center">Đăng ký tài khoản</h3>

      <!-- Thông báo lỗi (flash attribute từ redirect) -->
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <!-- th:action thay vì action để Thymeleaf tự inject CSRF token -->
      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Tối thiểu 3 ký tự"
                 minlength="3" maxlength="50" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" name="password" class="form-control" placeholder="Tối thiểu 6 ký tự"
                 minlength="6" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Xác nhận mật khẩu</label>
          <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu"
                 minlength="6" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-success">Đăng ký</button>
        </div>
      </form>

      <hr>
      <p class="text-center mb-0">
        Đã có tài khoản? <a href="/login">Đăng nhập</a>
      </p>
    </div>
  </div>
</body>
</html>
